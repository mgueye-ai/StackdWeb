<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening Stackd…</title>
    <link rel="icon" type="image/png" href="../../logo.png" />
    <link rel="apple-touch-icon" href="../../logo.png" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        text-align: center;
        padding: 24px;
      }
      p { color: #8e8e93; line-height: 1.5; max-width: 320px; }
    </style>
  </head>
  <body>
    <div>
      <h1>Opening Stackd…</h1>
      <p id="msg">If the app does not open, return to Stackd and sign in.</p>
    </div>
    <script>
      (function () {
        var appUrl =
          'stackd://auth/callback' + window.location.search + window.location.hash;
        window.location.replace(appUrl);
        setTimeout(function () {
          document.getElementById('msg').textContent =
            'Confirmation complete. Open the Stackd app to continue.';
        }, 2500);
      })();
    </script>
  </body>
</html>
